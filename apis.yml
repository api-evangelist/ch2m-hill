description: >-
  CH2M Hill was a global engineering, consulting, design, construction and
  operations firm providing services for corporations and federal, state,
  and local governments. Headquartered in Englewood, Colorado, the firm
  delivered work in water, transportation, environment, energy, industrial,
  and facilities markets. In December 2017 CH2M was acquired by Jacobs
  Engineering (now Jacobs Solutions) and its operations have been integrated
  into Jacobs. As of the acquisition, CH2M Hill no longer publishes a
  standalone public API program; relevant digital engineering, project
  delivery, and data services are now offered under the Jacobs brand.
